<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzelato — Rastrear Pedido</title>
<meta name="theme-color" content="#c0692b">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--o:#e8681a;--o2:#ff8c3a;--bg:#060d1a;--bg2:#0a1528;--t:#f0eee8;--t2:#c8c0b0;--t3:#7a8a9a;--g:#25d366}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px 60px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,104,26,.08),transparent 60%);pointer-events:none}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:var(--o2);margin-bottom:4px;text-align:center}
.logo-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:28px;text-align:center}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;width:100%;max-width:420px;margin-bottom:16px}
.status-big{text-align:center;padding:24px 0 16px}
.status-icon{font-size:56px;margin-bottom:12px;display:block}
.status-label{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px}
.status-sub{font-size:13px;color:var(--t3);margin-top:6px}
.etapas{display:flex;align-items:center;gap:0;padding:20px 0 8px}
.etapa{display:flex;flex-direction:column;align-items:center;flex:1}
.etapa-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;transition:all .4s;flex-shrink:0}
.etapa-ico.feita{background:var(--o);color:#fff;box-shadow:0 0 12px rgba(232,104,26,.4)}
.etapa-ico.atual{background:var(--o2);color:#fff;box-shadow:0 0 16px rgba(255,140,58,.5);animation:pulse2 1.5s infinite}
.etapa-ico.futura{background:rgba(255,255,255,.08);color:var(--t3)}
.etapa-nome{font-size:9px;color:var(--t3);text-align:center;margin-top:5px;letter-spacing:.5px;text-transform:uppercase}
.etapa-nome.ativa{color:var(--o2);font-weight:700}
.linha{flex:1;height:2px;margin-top:-18px;transition:background .4s}
.linha.feita{background:var(--o)}
.linha.futura{background:rgba(255,255,255,.1)}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.info-row:last-child{border:none}
.info-label{color:var(--t3)}
.info-val{font-weight:600;color:var(--t)}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:420px;padding:14px;background:linear-gradient(135deg,#25d366,#1da851);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none;margin-top:4px}
.timeline{padding:0}
.ts-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;font-size:12px}
.ts-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ts-dot.ok{background:var(--o)}
.ts-dot.pend{background:rgba(255,255,255,.15)}
.loading{text-align:center;padding:60px 0;font-size:13px;color:var(--t3);letter-spacing:1px}
.erro{text-align:center;padding:40px;color:var(--t3)}
@keyframes pulse2{0%,100%{box-shadow:0 0 12px rgba(255,140,58,.4)}50%{box-shadow:0 0 24px rgba(255,140,58,.8)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .5s ease}
</style>
</head>
<body>
<div class="logo">PIZZELATO</div>
<div class="logo-sub">Urban Pizza Cone · Rastreio de Pedido</div>

<div id="conteudo"><div class="loading">🍕 Carregando seu pedido...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const fb = initializeApp({
  apiKey:"AIzaSyCfts7IfOB7eajaSoI-x1zsi8lRo3NDO70",
  authDomain:"pizzelato-98e7c.firebaseapp.com",
  projectId:"pizzelato-98e7c",
  storageBucket:"pizzelato-98e7c.firebasestorage.app",
  messagingSenderId:"33999376460",
  appId:"1:33999376460:web:02646aa054832484e464e9"
});
const db = getFirestore(fb);

// Pegar ID do pedido da URL
const params = new URLSearchParams(location.search);
const vendaId = params.get('rastreio')||params.get('id')||'';

const STATUS = {
  novo:     {ico:'📋',label:'Pedido Recebido',   sub:'Recebemos seu pedido e estamos confirmando',   cor:'#7a8a9a'},
  preparo:  {ico:'🍕',label:'Em Preparo',         sub:'Seu cone está sendo preparado com carinho!',   cor:'#f0a000'},
  rota:     {ico:'🛵',label:'Saiu para Entrega',  sub:'O entregador está a caminho — prepara a fome!',cor:'#e8681a'},
  entregue: {ico:'✅',label:'Entregue!',           sub:'Aproveite muito! Obrigado por escolher a Pizzelato 🍕',cor:'#25d366'}
};
const ORDEM = ['novo','preparo','rota','entregue'];
const NOMES = ['Recebido','Preparo','A caminho','Entregue'];

function fmt(ts){ if(!ts) return '—'; const d=new Date(ts-3*60*60*1000); return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }

function render(ped){
  const status = ped.status||'novo';
  const s = STATUS[status]||STATUS.novo;
  const iAtual = ORDEM.indexOf(status);
  const cont = document.getElementById('conteudo');

  // Etapas visuais
  let etapasHTML = '<div class="etapas">';
  ORDEM.forEach((e,i)=>{
    const feita = i<iAtual, atual = i===iAtual, futura = i>iAtual;
    etapasHTML += `<div class="etapa">
      <div class="etapa-ico ${feita?'feita':atual?'atual':'futura'}">${feita?'✓':i+1}</div>
      <div class="etapa-nome ${atual?'ativa':''}">${NOMES[i]}</div>
    </div>`;
    if(i<ORDEM.length-1) etapasHTML+=`<div class="linha ${i<iAtual?'feita':'futura'}"></div>`;
  });
  etapasHTML+='</div>';

  // Timeline de horários
  let timelineHTML = '<div class="timeline">';
  const tsKeys = {novo:'ts_novo',preparo:'ts_preparo',rota:'ts_rota',entregue:'ts_entregue'};
  ORDEM.forEach((e,i)=>{
    const ts = ped.tsStatus?.[e]||ped[tsKeys[e]];
    const feita = i<=iAtual;
    timelineHTML+=`<div class="ts-item">
      <div class="ts-dot ${feita?'ok':'pend'}"></div>
      <div style="flex:1">
        <span style="font-weight:${feita?700:400};color:${feita?'var(--t)':'var(--t3)'}">${NOMES[i]}</span>
        <span style="color:var(--t3);margin-left:8px">${feita?fmt(ts):'—'}</span>
      </div>
    </div>`;
  });
  timelineHTML+='</div>';

  cont.innerHTML = `
    <div class="card">
      <div class="status-big">
        <span class="status-icon">${s.ico}</span>
        <div class="status-label" style="color:${s.cor}">${s.label}</div>
        <div class="status-sub">${s.sub}</div>
      </div>
      ${etapasHTML}
    </div>

    <div class="card">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:12px">Detalhes do Pedido</div>
      <div class="info-row"><span class="info-label">Cliente</span><span class="info-val">${ped.cliente||'—'}</span></div>
      <div class="info-row"><span class="info-label">Itens</span><span class="info-val" style="text-align:right;max-width:60%">${ped.itens||'—'}</span></div>
      <div class="info-row"><span class="info-label">Canal</span><span class="info-val">${(ped.canal||'').split(' ')[0]||'—'}</span></div>
      <div class="info-row"><span class="info-label">Horário do pedido</span><span class="info-val">${ped.hora||fmt(ped.ts)||'—'}</span></div>
    </div>

    <div class="card">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:12px">Histórico</div>
      ${timelineHTML}
    </div>

    ${status==='entregue'?`
    <div class="card" style="text-align:center;background:linear-gradient(135deg,rgba(37,211,102,.08),rgba(37,211,102,.03));border-color:rgba(37,211,102,.2)">
      <div style="font-size:24px;margin-bottom:8px">🎉</div>
      <div style="font-size:15px;font-weight:800;color:var(--t);margin-bottom:6px">Aproveite muito!</div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:16px">A cada 5 pedidos você ganha 1 cone grátis!</div>
      <a href="https://pizzelato.github.io/Cardapio/" style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--o);color:#fff;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none">🍕 Pedir de novo</a>
    </div>`:''}

    <a href="https://wa.me/5579996508292" class="btn-wa" target="_blank">💬 Falar com a Pizzelato</a>

    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--t3)">
      Atualização automática em tempo real · Pizzelato Urban Pizza Cone
    </div>`;
}

if(!vendaId){
  document.getElementById('conteudo').innerHTML=`<div class="erro">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="font-size:15px;font-weight:700;color:var(--t);margin-bottom:8px">Link inválido</div>
    <div style="font-size:13px">O link de rastreio não foi encontrado.<br>Verifique o link enviado pela Pizzelato.</div>
    <a href="https://wa.me/5579996508292" style="display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:12px 24px;background:#25d366;color:#fff;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none">💬 Falar com a Pizzelato</a>
  </div>`;
} else {
  // Escutar mudanças em tempo real
  onSnapshot(doc(db,'rastreio',vendaId), snap=>{
    if(snap.exists()) render(snap.data());
    else {
      // Tentar pegar da coleção de vendas diretamente
      document.getElementById('conteudo').innerHTML=`<div class="erro">
        <div style="font-size:40px;margin-bottom:12px">⏳</div>
        <div style="font-size:15px;font-weight:700;color:var(--t);margin-bottom:8px">Pedido ainda não rastreável</div>
        <div style="font-size:13px;color:var(--t3)">O rastreamento fica disponível assim que o pedido entrar em preparo.</div>
      </div>`;
    }
  });
}
</script>
</body>
</html>
